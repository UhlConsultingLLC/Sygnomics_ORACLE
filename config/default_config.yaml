# CT Collection Threshold Learning - Pipeline Configuration

database:
  url: "sqlite:///data/ct_pipeline.db"
  echo: false  # SQLAlchemy SQL logging

clinicaltrials:
  max_results_per_query: 1000
  page_size: 100
  retry_max_attempts: 3
  retry_backoff_factor: 2.0
  request_delay_seconds: 0.5

chembl:
  retry_max_attempts: 3
  retry_backoff_factor: 2.0
  request_delay_seconds: 0.5

ctis:
  max_results_per_query: 500
  page_size: 100
  retry_max_attempts: 3
  retry_backoff_factor: 2.0
  request_delay_seconds: 0.5
  fetch_details: true  # Fetch full trial detail (slower but richer data)

mesh:
  api_base_url: "https://id.nlm.nih.gov/mesh"
  max_related_terms: 20

tcga:
  mode: "auto"  # "api", "local", or "auto" (check local first, fall back to API)
  local_path: "data/tcga_local"
  cache_dir: "data/tcga_cache"
  gdc_api_base: "https://api.gdc.cancer.gov"
  gdc_token_path: ""  # path to GDC auth token file (optional, for controlled-access data)
  default_project: "TCGA-GBM"

analysis:
  response_rate_default: 0.15  # default response rate when not available from trial data
  confidence_level: 0.95

split:
  strategy: "stratified"  # "random", "stratified", or "temporal"
  test_fraction: 0.2
  random_seed: 42
  stratify_by:
    - "moa_category"
    - "response_rate_bin"

threshold:
  method: "youden"  # "youden", "cost_based", or "percentile"
  cost_fn_ratio: 1.0  # false_negative_cost / false_positive_cost (for cost_based)
  percentile: 0.5  # for percentile method

visualization:
  theme: "plotly_white"
  color_palette: "Set2"
  default_export_formats:
    - "png"
    - "svg"
  figure_width: 900
  figure_height: 600

api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:5173"  # Vite dev server (default)
    - "http://localhost:5174"  # Vite auto-bumps here when 5173 is taken
    - "http://localhost:5175"  # spare for parallel dev servers
    - "http://localhost:3000"
