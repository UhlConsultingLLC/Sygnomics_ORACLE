# Auto-draft a GitHub Release from merged PR titles.
# Runs on every push to main; creates/updates a DRAFT release that
# the maintainer can review and publish manually.

name: Release Drafter

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  update-release-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
